<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站 - xzcdd.com</title>
    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f4f6f9;
            --text-color: #333;
            --card-bg: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            background-color: var(--secondary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background-color: rgba(255,255,255,0.1);
        }

        /* 主体内容 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            padding: 4rem 0;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 功能区网格 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #eee;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .feature-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .feature-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .feature-desc {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* 页脚 */
        footer {
            background-color: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-cube"></i> xzcdd.com
        </div>
        <ul class="nav-links">
            <li><a href="#"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="#features"><i class="fas fa-th-large"></i> 功能区</a></li>
            <li><a href="#"><i class="fas fa-user"></i> 关于我</a></li>
        </ul>
    </nav>

    <!-- 主体内容 -->
    <div class="container">
        <section class="hero">
            <h1>欢迎来到我的个人工具站</h1>
            <p>这里汇集了我开发的各种实用小工具，希望能提高你的工作和生活效率。</p>
        </section>

        <section id="features" class="features-grid">
            <!-- 工具卡片 1：语音提醒器 -->
            <a href="reminder/index.html" class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <h3 class="feature-title">智能语音提醒器</h3>
                <p class="feature-desc">支持自定义时间段、循环播报、倒计时的Web版语音提醒工具，无需下载安装。</p>
                <span class="btn">立即使用 <i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- 工具卡片 2：宠物殡葬服务 -->
            <a href="pet-funeral/index.html" class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-paw"></i>
                </div>
                <h3 class="feature-title">宠物殡葬服务</h3>
                <p class="feature-desc">提供全流程宠物善终服务，包含纪念品选购、在线祈福、虚拟灵堂等关怀服务。</p>
                <span class="btn">进入专区 <i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- 工具卡片 3：预留位 (示例) -->
            <div class="feature-card" style="opacity: 0.7; cursor: default;">
                <div class="feature-icon">
                    <i class="fas fa-tools"></i>
                </div>
                <h3 class="feature-title">更多工具开发中...</h3>
                <p class="feature-desc">敬请期待更多实用功能上线。</p>
                <span class="btn" style="background-color: #ccc;">敬请期待</span>
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2024 xzcdd.com 版权所有</p>
    </footer>
</body>
</html>

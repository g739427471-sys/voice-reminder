<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 宠爱天堂</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8e44ad;
            --text-color: #333;
            --bg-color: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .login-container {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-icon {
            position: absolute;
            left: 12px;
            top: 13px;
            color: #999;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-block:hover { background-color: #7d3c98; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            margin-top: 10px;
        }

        .captcha-row {
            display: flex;
            gap: 10px;
        }

        .captcha-btn {
            width: 120px;
            padding: 0;
            font-size: 12px;
            background: #eee;
            border: 1px solid #ddd;
            color: #666;
            cursor: pointer;
        }

        .qrcode-container {
            text-align: center;
            padding: 20px;
        }

        .qrcode-img {
            width: 180px;
            height: 180px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            padding: 10px;
        }

        .hidden { display: none; }

        .tips {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-paw"></i> 宠爱天堂</h2>
            <p>用户登录</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('mobile')">手机验证码</div>
            <div class="tab" onclick="switchTab('password')">账号密码</div>
            <div class="tab" onclick="switchTab('wechat')">微信扫码</div>
        </div>

        <!-- 手机验证码登录 -->
        <form id="mobile-form" class="login-form">
            <div class="form-group">
                <i class="fas fa-mobile-alt form-icon"></i>
                <input type="text" class="form-control" placeholder="请输入手机号" maxlength="11" required>
            </div>
            <div class="form-group captcha-row">
                <div style="position:relative; flex:1;">
                    <i class="fas fa-shield-alt form-icon"></i>
                    <input type="text" class="form-control" placeholder="验证码" maxlength="6" required id="mobile-code">
                </div>
                <button type="button" class="captcha-btn" onclick="sendCaptcha(this)">获取验证码</button>
            </div>
            <button type="submit" class="btn-block">登录 / 注册</button>
        </form>

        <!-- 账号密码登录 -->
        <form id="password-form" class="login-form hidden">
            <div class="form-group">
                <i class="fas fa-user form-icon"></i>
                <input type="text" class="form-control" id="acc-username" placeholder="邮箱 / 用户名" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" class="form-control" id="acc-password" placeholder="密码" required>
            </div>
            <button type="submit" class="btn-block">立即登录</button>
            <div style="text-align:right; margin-top:10px; font-size:12px;">
                <a href="#" style="color:#666;">忘记密码?</a>
            </div>
        </form>

        <!-- 微信扫码登录 -->
        <div id="wechat-form" class="login-form hidden qrcode-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=MockWechatLogin" class="qrcode-img" alt="WeChat QR">
            <p>请使用微信扫描二维码登录</p>
            <button type="button" class="btn-block btn-outline" onclick="mockWechatScan()">模拟扫码成功</button>
        </div>

        <div class="tips">
            <p>演示账号: xzcdd / 521125xnx (管理员)</p>
            <p>演示账号: user / 123 (普通用户)</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.add('hidden'));
            
            event.target.classList.add('active');
            document.getElementById(type + '-form').classList.remove('hidden');
        }

        // 模拟发送验证码
        function sendCaptcha(btn) {
            btn.disabled = true;
            let count = 60;
            btn.innerText = `${count}s后重试`;
            
            alert('【模拟短信】您的验证码是：123456');
            document.getElementById('mobile-code').value = '123456';

            const timer = setInterval(() => {
                count--;
                btn.innerText = `${count}s后重试`;
                if (count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '获取验证码';
                }
            }, 1000);
        }

        // 处理登录
        async function handleLogin(type, data) {
            const btn = document.querySelector(`#${type}-form button[type="submit"]`);
            if(btn) {
                btn.disabled = true;
                btn.innerText = '登录中...';
            }

            try {
                const res = await AuthService.login({ type, ...data });
                if (res.success) {
                    // 跳转逻辑
                    const redirect = sessionStorage.getItem('auth_redirect') || 'index.html';
                    sessionStorage.removeItem('auth_redirect');
                    window.location.href = redirect;
                }
            } catch (err) {
                alert(err.message);
                if(btn) {
                    btn.disabled = false;
                    btn.innerText = '重试';
                }
            }
        }

        document.getElementById('mobile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleLogin('mobile', { code: document.getElementById('mobile-code').value });
        });

        document.getElementById('password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleLogin('password', {
                account: document.getElementById('acc-username').value,
                password: document.getElementById('acc-password').value
            });
        });

        function mockWechatScan() {
            handleLogin('wechat', {});
        }
    </script>
</body>
</html>

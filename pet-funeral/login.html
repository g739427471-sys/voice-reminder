<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 宠爱天堂</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8e44ad;
            --text-color: #333;
            --bg-color: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .login-container {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-icon {
            position: absolute;
            left: 12px;
            top: 13px;
            color: #999;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-block:hover { background-color: #7d3c98; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            margin-top: 10px;
        }

        .captcha-row {
            display: flex;
            gap: 10px;
        }

        .captcha-btn {
            width: 120px;
            padding: 0;
            font-size: 12px;
            background: #eee;
            border: 1px solid #ddd;
            color: #666;
            cursor: pointer;
        }

        .qrcode-container {
            text-align: center;
            padding: 20px;
        }

        .qrcode-img {
            width: 180px;
            height: 180px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            padding: 10px;
        }

        .hidden { display: none; }

        .tips {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-paw"></i> 宠爱天堂</h2>
            <p>用户登录</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('mobile')">手机验证码</div>
            <div class="tab" onclick="switchTab('password')">账号密码</div>
            <div class="tab" onclick="switchTab('wechat')">微信扫码</div>
        </div>

        <!-- 手机验证码登录 -->
        <form id="mobile-form" class="login-form">
            <div class="form-group">
                <i class="fas fa-mobile-alt form-icon"></i>
                <input type="text" class="form-control" placeholder="请输入手机号" maxlength="11" required>
            </div>
            <div class="form-group captcha-row">
                <div style="position:relative; flex:1;">
                    <i class="fas fa-shield-alt form-icon"></i>
                    <input type="text" class="form-control" placeholder="验证码" maxlength="6" required id="mobile-code">
                </div>
                <button type="button" class="captcha-btn" onclick="sendCaptcha(this)">获取验证码</button>
            </div>
            <button type="submit" class="btn-block">登录 / 注册</button>
        </form>

        <!-- 账号密码登录 -->
        <form id="password-form" class="login-form hidden">
            <div class="form-group">
                <i class="fas fa-user form-icon"></i>
                <input type="email" class="form-control" id="acc-username" placeholder="邮箱" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" class="form-control" id="acc-password" placeholder="密码" required>
            </div>
            <button type="submit" class="btn-block">立即登录</button>
            <button type="button" class="btn-block btn-outline" onclick="handleRegister()">注册新账号</button>
            <div style="text-align:right; margin-top:10px; font-size:12px;">
                <a href="#" style="color:#666;">忘记密码?</a>
            </div>
        </form>

        <!-- 微信扫码登录 -->
        <div id="wechat-form" class="login-form hidden qrcode-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=MockWechatLogin" class="qrcode-img" alt="WeChat QR">
            <p>请使用微信扫描二维码登录</p>
            <button type="button" class="btn-block btn-outline" onclick="mockWechatScan()">模拟扫码成功</button>
        </div>

        <div class="tips">
            <p>提示: 首次使用请点击“注册新账号”</p>
            <p>如需进入管理后台，请联系管理员设置权限</p>
        </div>
    </div>

    <!-- 1. 引入外部脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Tab 切换逻辑
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.add('hidden'));
            
            // Find tab by text content (approximate) or index
            const tabs = document.querySelectorAll('.tab');
            if (type === 'mobile') { tabs[0].classList.add('active'); document.getElementById('mobile-form').classList.remove('hidden'); }
            if (type === 'password') { tabs[1].classList.add('active'); document.getElementById('password-form').classList.remove('hidden'); }
            if (type === 'wechat') { tabs[2].classList.add('active'); document.getElementById('wechat-form').classList.remove('hidden'); }
        }

        // 默认显示账号密码登录
        document.addEventListener('DOMContentLoaded', () => {
            switchTab('password');
        });

        // 账号密码登录处理
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const email = document.getElementById('acc-username').value;
            const password = document.getElementById('acc-password').value;
            
            btn.disabled = true;
            btn.innerText = '登录中...';

            try {
                const res = await AuthService.login(email, password);
                if (res.success) {
                    const redirect = sessionStorage.getItem('auth_redirect') || 'index.html';
                    sessionStorage.removeItem('auth_redirect');
                    window.location.href = redirect;
                } else {
                    alert('登录失败: ' + res.message);
                    btn.disabled = false;
                    btn.innerText = '立即登录';
                }
            } catch (err) {
                console.error(err);
                alert('系统错误');
                btn.disabled = false;
                btn.innerText = '立即登录';
            }
        });

        // 注册功能
        async function handleRegister() {
            const email = document.getElementById('acc-username').value;
            const password = document.getElementById('acc-password').value;

            if (!email || !password) {
                return alert('请输入邮箱和密码');
            }

            if (confirm('确定使用当前邮箱和密码注册吗？')) {
                const res = await AuthService.register(email, password);
                if (res.success) {
                    // 注册成功后，尝试自动登录并创建 Profile
                    const loginRes = await AuthService.login(email, password);
                    if (loginRes.success) {
                        // 插入 profile 数据 (使用 AuthService 的 login 结果，注意 login 返回的是对象 {success: true, user: ...})
                        const user = loginRes.user;
                        if (user) {
                            const { error: profileError } = await window.supabaseClient
                                .from('profiles')
                                .upsert({ // 使用 upsert 避免主键冲突
                                    id: user.id,
                                    username: email.split('@')[0],
                                    role: 'user',
                                    avatar_url: `https://ui-avatars.com/api/?name=${email}&background=random`
                                }, { onConflict: 'id' });
                            
                            if (profileError) {
                                console.error('Profile creation failed:', profileError);
                            }
                        }

                        alert('注册成功并已登录！');
                        window.location.href = 'index.html';
                    } else {
                        alert('注册成功，但自动登录失败，请手动登录。');
                    }
                } else {
                    alert('注册失败: ' + res.message);
                }
            }
        }

        // 模拟其他登录方式 (保留 UI 但提示)
        document.getElementById('mobile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('手机验证码登录暂未开放，请使用账号密码登录。');
        });

        function mockWechatScan() {
            alert('微信登录暂未开放，请使用账号密码登录。');
        }
    </script>
</body>
</html>
